                    name:
                      description: Name selects a specific CR by name. Mutually exclusive
                        with Selector.
                      type: string
                    namespace:
                      description: Namespace scopes the lookup. Required for namespaced
                        resources.
                      type: string
                    patches:
                      description: Patches is the list of field+template pairs to
                        apply to each matched CR.
                      items:
