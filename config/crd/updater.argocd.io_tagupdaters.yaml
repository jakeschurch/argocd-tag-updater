                properties:
                  name:
                    type: string
                  namespace:
                    type: string
                required:
                - name
                type: object
              interval:
                description: Interval between tag polls. Defaults to 2m.
                type: string
              source:
                properties:
                  repo:
                    description: Repo is a git remote URL (git source) or OCI repository
                      reference (oci source).
                    type: string
                  tagPattern:
                    description: |-
                      TagPattern is a named-group regex. Captures are available in Patch templates.
                      The capture named "n" is used as the sort key to select the latest tag.
                      e.g.: platform\.(?P<branch>[^.]+)\.build-(?P<n>\d+)\.(?P<sha>[0-9a-f]{6,})
                    type: string
                  type:
                    type: string
                required:
                - repo
                - tagPattern
                - type
